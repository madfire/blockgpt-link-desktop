directories:
  buildResources: buildResources
  output: dist
extraResources:
  - from: tools
    to: tools
    filter:
      - "**/*"
      - "!**/.DS_Store"
      - "!**/Thumbs.db"
      - "!Arduino/staging/**"
      - "!Arduino/tmp/**"
      - "!Python/归档.zip"
      - "!Arduino/packages/rp2040/**"
      - "!Arduino/packages/esp8266/**"
      - "!Arduino/package_rp2040_index.json"
      - "!Arduino/package_esp8266com_index.json"
  - from: external-resources
    to: external-resources
    filter:
      - "**/*"
      - "!**/.DS_Store"
      - "!**/Thumbs.db"
  - from: firmwares
    to: firmwares
    filter:
      - "**/*"
      - "!**/.DS_Store"
      - "!**/Thumbs.db"
  - from: statics
    to: statics
    filter:
      - "**/*"
      - "!**/.DS_Store"
      - "!**/Thumbs.db"
  - from: drivers
    to: drivers
    filter:
      - "**/*"
      - "!**/.DS_Store"
      - "!**/Thumbs.db"

appId: 'madfire.blockgpt-link'
productName: "BlockGPT Link"
publish: # empty provider list = don't publish

mac:
  category: public.app-category.education
  entitlements: buildResources/entitlements.mac.plist
  gatekeeperAssess: true
  hardenedRuntime: true
  icon: buildResources/BlockGPT-Link.icns
  provisioningProfile: embedded.provisionprofile
  artifactName: "BlockGPT Link ${version}.${ext}"
  target:
    - dmg
    # - mas
dmg:
  title: "BlockGPT Link ${version}"
  background: buildResources/screenshot.png
# mas:
#   category: public.app-category.education
#   entitlements: buildResources/entitlements.mas.plist
#   entitlementsInherit: buildResources/entitlements.mas.inherit.plist
#   hardenedRuntime: false
#   icon: buildResources/BlockGPT-Link.icns

win:
  icon: buildResources/BlockGPT-Link.ico
  target:
    # - appx
    - nsis
# appx:
#   identityName: BlockGPT.BlockGPTLinkDesktop
#   publisherDisplayName: "BlockGPT"
#   publisher: "CN=2EC43DF1-469A-4119-9AB9-568A0A1FF65F"
#   artifactName: "BlockGPT Link Desktop ${version}.${ext}"
nsis:
  oneClick: false # allow user to choose per-user or per-machine
  allowToChangeInstallationDirectory: true
  include: buildResources/installer.nsh
#   license: LICENSE
  artifactName: "BlockGPT Link ${version} Setup.${ext}"
