<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>BlockGPT Link</title>

    <link rel="stylesheet" type="text/css" href="index.css">
    <style>
        body {
            background: linear-gradient(160deg, #eef6ff 0%, #ddeaff 48%, #d6e5ff 100%);
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
        }

        .splash {
            color: #17314f;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: xx-large;
            font-weight: bolder;
            margin: 0;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .app {
            min-height: 100vh;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="app">
        <div>
            <img class="logo" alt="BlockGPT-Link.svg" src="./icon/BlockGPT-Link.svg" />
        </div>
        <div class="info">
            <h2 id="product-name">
                <span class="orange-text">Block</span>GPT Link</h2>
            <div class="version">
                <div id="product-version">Version 0.0.0</div>
                <div class="component-version">
                    <p id="electron-version">Electron 0.0.0</p>
                    <p id="chrome-version">Chrome 00.0.0000.000</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        (() => {
            try {
                const fs = require('fs');
                const os = require('os');
                const path = require('path');
                const logPath = path.join(os.tmpdir(), 'blockgpt-link-renderer.log');
                const write = message => fs.appendFileSync(logPath, `[${new Date().toISOString()}] ${message}\n`);
                write('renderer: script start');
                window.addEventListener('error', event => {
                    write(`renderer: window error ${event.message || 'unknown'}`);
                });
                window.addEventListener('DOMContentLoaded', () => {
                    write('renderer: DOMContentLoaded');
                    document.body.setAttribute('data-renderer-ready', 'true');
                });
                window.addEventListener('load', () => {
                    write('renderer: window load');
                });
            } catch (error) {
                // ignore renderer logging failures
            }
        })();
    </script>
</body>

</html>
